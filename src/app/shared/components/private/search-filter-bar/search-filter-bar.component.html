<div class="my-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm sm:p-5">
  <div class="flex flex-col gap-4 xl:flex-row xl:items-end">
    <div class="flex-1">
      <label class="mb-2 block text-sm font-medium text-stone-700">
        Search
      </label>

      <div class="relative">
        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-stone-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0a6.5 6.5 0 0 1 13 0Z" />
          </svg>
        </span>

        <input
          type="text"
          [ngModel]="searchValue"
          (ngModelChange)="onSearchInput($event)"
          [placeholder]="searchPlaceholder"
          class="w-full rounded-xl border border-stone-300 bg-white py-2.5 pl-10 pr-4 text-sm text-stone-800 outline-none transition placeholder:text-stone-400 focus:border-[#ea938c]"
        />
      </div>
    </div>

    <div
      *ngFor="let filter of filters"
      class="w-full xl:w-auto xl:min-w-[180px]"
    >
      <label class="mb-2 block text-sm font-medium text-stone-700">
        {{ filter.label }}
      </label>

      <select
        [ngModel]="filter.value"
        (ngModelChange)="onFilterSelect(filter.key, $event)"
        class="w-full rounded-xl border border-stone-300 bg-white px-3 py-2.5 text-sm text-stone-800 outline-none transition focus:border-[#ea938c]"
      >
        <option *ngFor="let option of filter.options" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
    </div>

    <div *ngIf="showReset" class="xl:pb-[1px]">
      <button
        type="button"
        (click)="reset.emit()"
        class="inline-flex w-full items-center justify-center rounded-xl border border-stone-300 bg-white px-4 py-2.5 text-sm font-medium text-stone-700 transition hover:bg-stone-50 xl:w-auto"
      >
        Reset
      </button>
    </div>
  </div>
</div>
