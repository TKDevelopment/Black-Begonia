<div
  *ngIf="open"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
>
  <div class="w-full max-w-md rounded-2xl border border-black/10 bg-white p-6 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-xl font-semibold text-stone-900">
          {{ title }}
        </h3>
        <p class="mt-2 text-sm leading-6 text-stone-600">
          {{ description }}
        </p>
      </div>

      <button
        type="button"
        (click)="onClose()"
        [disabled]="loading"
        class="rounded-full px-3 py-1 text-stone-500 transition hover:bg-stone-100 disabled:opacity-60"
      >
        ✕
      </button>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="onClose()"
        [disabled]="loading"
        class="inline-flex items-center justify-center rounded-xl border border-black/10 bg-white px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ cancelLabel }}
      </button>

      <button
        type="button"
        (click)="onConfirm()"
        [disabled]="loading"
        class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium transition disabled:cursor-not-allowed disabled:opacity-60"
        [ngClass]="confirmButtonClasses"
      >
        {{ loading ? 'Working...' : confirmLabel }}
      </button>
    </div>
  </div>
</div>
