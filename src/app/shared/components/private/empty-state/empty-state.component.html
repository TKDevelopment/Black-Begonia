<div class="rounded-2xl border border-stone-200 bg-white px-6 py-12 text-center shadow-sm">
  <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-stone-100 text-stone-500">
    <ng-container [ngSwitch]="icon">
      <svg *ngSwitchCase="'search'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0a6.5 6.5 0 0 1 13 0Z" />
      </svg>

      <svg *ngSwitchCase="'tasks'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6h11M9 12h11M9 18h11M5 6h.01M5 12h.01M5 18h.01" />
      </svg>

      <svg *ngSwitchCase="'contacts'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19a4 4 0 0 0-8 0m8 0h3m-3 0a4 4 0 1 0-8 0m8 0H7m5-8a4 4 0 1 0 0-8a4 4 0 0 0 0 8Zm6 8a3 3 0 0 0-2.84-2M18 11a3 3 0 1 0 0-6" />
      </svg>

      <svg *ngSwitchCase="'projects'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5A1.5 1.5 0 0 1 4.5 6h5A1.5 1.5 0 0 1 11 7.5V9h8.5A1.5 1.5 0 0 1 21 10.5v7A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5v-10Z" />
      </svg>

      <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7.5A1.5 1.5 0 0 1 5.5 6h13A1.5 1.5 0 0 1 20 7.5v9A1.5 1.5 0 0 1 18.5 18h-13A1.5 1.5 0 0 1 4 16.5v-9Zm0 2 8 5 8-5" />
      </svg>
    </ng-container>
  </div>

  <h3 class="text-xl font-semibold text-stone-900">
    {{ title }}
  </h3>

  <p class="mx-auto mt-2 max-w-xl text-sm md:text-base text-stone-600">
    {{ description }}
  </p>

  <button
    *ngIf="actionLabel"
    type="button"
    (click)="action.emit()"
    class="mt-6 inline-flex items-center justify-center rounded-xl bg-[#ea938c] px-4 py-2 text-sm font-medium text-white transition hover:opacity-90"
  >
    {{ actionLabel }}
  </button>
</div>
