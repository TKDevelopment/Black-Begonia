<div class="overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm">
  <div *ngIf="loading" class="p-4 sm:p-5 md:p-6">
    <div class="space-y-3">
      <div class="h-10 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-10 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-10 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-10 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-10 animate-pulse rounded-xl bg-stone-100"></div>
    </div>
  </div>

  <ng-container *ngIf="!loading">
    <ng-container *ngIf="rows?.length; else emptyBlock">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-stone-200">
          <thead class="bg-stone-50">
            <tr>
              <th
                *ngFor="let column of columns"
                scope="col"
                class="px-3 py-3 text-left text-[11px] font-semibold uppercase tracking-[0.18em] text-stone-600 sm:px-4 md:px-6 md:py-4 md:text-xs"
                [ngClass]="column.headerClassName"
              >
                {{ column.label | titlecase}}
              </th>
            </tr>
          </thead>

          <tbody class="divide-y divide-stone-100 bg-white">
            <tr
              *ngFor="let row of rows; trackBy: trackByRow"
              (click)="onRowClicked(row)"
              class="transition"
              [class.cursor-pointer]="clickableRows"
              [class.hover:bg-stone-50]="clickableRows"
            >
              <td
                *ngFor="let column of columns"
                class="px-3 py-3 align-top text-xs text-stone-700 sm:px-4 sm:text-sm md:px-6 md:py-4"
                [ngClass]="column.className"
              >
                <ng-container *ngIf="getCellTemplate(column.key) as customTemplate; else defaultCell">
                  <ng-container
                    *ngTemplateOutlet="customTemplate.template; context: { $implicit: row, row: row, value: row?.[column.key], column: column }"
                  ></ng-container>
                </ng-container>

                <ng-template #defaultCell>
                  {{ row?.[column.key] ?? '-' }}
                </ng-template>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-container>

    <ng-template #emptyBlock>
      <div class="p-4 sm:p-5 md:p-6">
        <app-empty-state
          [title]="emptyTitle"
          [description]="emptyDescription"
          icon="search"
        />
      </div>
    </ng-template>
  </ng-container>
</div>
