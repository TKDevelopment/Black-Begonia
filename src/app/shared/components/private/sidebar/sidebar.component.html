<aside class="flex h-screen w-full flex-col bg-white">
  <!-- Top branding -->
  <div class="border-b border-black/10 px-6 py-8">
    <a routerLink="/admin/dashboard" class="block">
      <p class="font-oswald text-[11px] uppercase tracking-[0.35em] text-[#ea938c]">
        Black Begonia
      </p>
      <h2 class="mt-3 font-cormorant text-3xl leading-none text-[#1f1f1f]">
        Admin CRM
      </h2>
    </a>

    <div class="mt-6 h-px w-20 bg-[#ea938c]"></div>

    <div class="mt-6">
      <p class="font-oswald text-[10px] uppercase tracking-[0.28em] text-[#7a7a7a]">
        Signed in as
      </p>
      <p class="mt-2 font-cormorant text-2xl leading-tight text-[#1f1f1f]">
        {{ userDisplayName }}
      </p>
      <p class="mt-1 break-all text-sm text-[#6a6a6a]">
        {{ userEmail }}
      </p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto px-4 py-6">
    <ul class="space-y-2">
      <li *ngFor="let item of navItems">
        <a
          [routerLink]="item.route"
          [routerLinkActive]="'bg-black text-white shadow-md'"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          class="group flex items-center justify-between rounded-2xl px-4 py-3 font-oswald text-sm uppercase tracking-[0.22em] text-[#2d2d2d] transition duration-300 hover:bg-[#f7f4f1] hover:text-[#ea938c]"
        >
          <span [routerLinkActive]="'text-white hover:text-black'">{{ item.label }}</span>
          <span class="h-2 w-2 rounded-full bg-transparent transition duration-300 group-hover:bg-[#ea938c]"></span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer / logout -->
  <div class="border-t border-black/10 px-4 py-5">
    <button
      type="button"
      (click)="logout()"
      class="flex w-full items-center justify-center rounded-2xl border border-black/10 bg-[#f7f4f1] px-4 py-3 font-oswald text-sm uppercase tracking-[0.22em] text-[#1f1f1f] transition duration-300 hover:border-[#ea938c] hover:bg-[#ea938c] hover:text-white"
    >
      Log Out
    </button>
  </div>
</aside>
