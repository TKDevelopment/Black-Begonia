<div class="space-y-3 md:space-y-5">
  <div class="rounded-2xl border border-stone-200 bg-white p-3.5 shadow-sm sm:p-4 md:p-5">
    <button
      type="button"
      (click)="onBack()"
      class="mb-3 inline-flex items-center gap-2 text-[13px] font-medium text-stone-600 transition hover:text-stone-900"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
      {{ backLabel }}
    </button>

    <div *ngIf="!loading; else loadingHeader">
      <h1 class="text-[1.65rem] font-semibold tracking-tight text-stone-900 sm:text-[1.9rem]">
        {{ title | titlecase}}
      </h1>

      <p *ngIf="subtitle" class="mt-1 max-w-3xl text-[13px] text-stone-600 md:text-sm">
        {{ subtitle | titlecase }}
      </p>
    </div>

    <ng-template #loadingHeader>
      <div class="space-y-2.5">
        <div class="h-7 w-64 animate-pulse rounded-lg bg-stone-100"></div>
        <div class="h-4 w-96 max-w-full animate-pulse rounded-lg bg-stone-100"></div>
      </div>
    </ng-template>
  </div>

  <div *ngIf="loading; else detailContent" class="grid grid-cols-1 gap-3 xl:grid-cols-[minmax(0,1fr)_340px] 2xl:grid-cols-[minmax(0,1fr)_400px] md:gap-5">
    <div class="space-y-3 rounded-2xl border border-stone-200 bg-white p-3.5 shadow-sm sm:p-4 md:p-5">
      <div class="h-6 w-40 animate-pulse rounded-lg bg-stone-100"></div>
      <div class="h-32 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-32 animate-pulse rounded-xl bg-stone-100"></div>
    </div>

    <div class="space-y-3 rounded-2xl border border-stone-200 bg-white p-3.5 shadow-sm sm:p-4 md:p-5">
      <div class="h-6 w-32 animate-pulse rounded-lg bg-stone-100"></div>
      <div class="h-24 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-24 animate-pulse rounded-xl bg-stone-100"></div>
    </div>
  </div>

  <ng-template #detailContent>
    <div class="grid grid-cols-1 gap-3 xl:grid-cols-[minmax(0,1fr)_340px] 2xl:grid-cols-[minmax(0,1fr)_400px] md:gap-5">
      <section class="min-w-0 space-y-3 md:space-y-5">
        <ng-content select="[detail-main]"></ng-content>
      </section>

      <aside class="min-w-0 space-y-3 md:space-y-5">
        <ng-content select="[detail-sidebar]"></ng-content>
      </aside>
    </div>
  </ng-template>
</div>
