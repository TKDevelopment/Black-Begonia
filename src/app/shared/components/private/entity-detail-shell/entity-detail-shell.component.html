<div class="space-y-6">
  <div class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
    <button
      type="button"
      (click)="onBack()"
      class="mb-4 inline-flex items-center gap-2 text-sm font-medium text-stone-600 transition hover:text-stone-900"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
      {{ backLabel }}
    </button>

    <div *ngIf="!loading; else loadingHeader">
      <h1 class="text-3xl font-semibold tracking-tight text-stone-900">
        {{ title | titlecase}}
      </h1>

      <p *ngIf="subtitle" class="mt-1 text-sm md:text-base text-stone-600">
        {{ subtitle | titlecase }}
      </p>
    </div>

    <ng-template #loadingHeader>
      <div class="space-y-3">
        <div class="h-8 w-64 animate-pulse rounded-lg bg-stone-100"></div>
        <div class="h-4 w-96 max-w-full animate-pulse rounded-lg bg-stone-100"></div>
      </div>
    </ng-template>
  </div>

  <div *ngIf="loading; else detailContent" class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1fr)_340px]">
    <div class="space-y-4 rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
      <div class="h-6 w-40 animate-pulse rounded-lg bg-stone-100"></div>
      <div class="h-32 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-32 animate-pulse rounded-xl bg-stone-100"></div>
    </div>

    <div class="space-y-4 rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
      <div class="h-6 w-32 animate-pulse rounded-lg bg-stone-100"></div>
      <div class="h-24 animate-pulse rounded-xl bg-stone-100"></div>
      <div class="h-24 animate-pulse rounded-xl bg-stone-100"></div>
    </div>
  </div>

  <ng-template #detailContent>
    <div class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1fr)_340px]">
      <section class="min-w-0 space-y-6">
        <ng-content select="[detail-main]"></ng-content>
      </section>

      <aside class="min-w-0 space-y-6">
        <ng-content select="[detail-sidebar]"></ng-content>
      </aside>
    </div>
  </ng-template>
</div>
