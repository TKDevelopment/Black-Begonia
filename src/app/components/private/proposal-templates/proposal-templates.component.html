<div class="space-y-6 p-8">
  <app-crm-page-header
    title="Proposal Templates"
    subtitle="Manage template records and renderer strategies here. Open Studio only when you want to edit layout."
    primaryActionLabel="New Template"
    (primaryAction)="openCreateModal()"
  />

  <section class="rounded-[28px] border border-black/10 bg-white p-5 shadow-sm">
    <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <h2 class="text-lg font-semibold text-stone-900">Template Registry</h2>
        <p class="text-sm text-stone-500">These records populate the Floral Proposal Builder template dropdown and choose which renderer strategy handles injected data.</p>
      </div>
      <input type="search" class="w-full rounded-2xl border border-black/10 px-4 py-3 md:max-w-xs" [ngModel]="searchTerm()" (ngModelChange)="updateSearch($event)" placeholder="Search templates or renderers" />
    </div>

    <app-loading-state-block *ngIf="loading()" title="Loading templates" description="Please wait while we load your proposal template records." minHeightClass="min-h-[260px]" />
    <app-error-state-block *ngIf="!loading() && error()" title="Unable to load templates" [description]="error()!" (retry)="loadTemplates()" minHeightClass="min-h-[260px]" />

    <div *ngIf="!loading() && !error()" class="grid gap-4">
      <article *ngFor="let template of filteredTemplates()" class="flex flex-col gap-4 rounded-[24px] border border-black/10 bg-[#fcfaf8] p-5">
        <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
          <div class="space-y-2">
            <div class="flex flex-wrap items-center gap-2">
              <h3 class="text-lg font-semibold text-stone-900">{{ template.name }}</h3>
              <app-status-badge
                [label]="template.is_active ? 'Active' : 'Inactive'"
                [tone]="template.is_active ? 'success' : 'neutral'"
              />
              <app-status-badge
                *ngIf="template.is_default"
                label="Default"
                tone="info"
              />
              <app-status-badge
                [label]="getRendererLabel(template)"
                tone="neutral"
              />
            </div>
            <p class="text-sm text-stone-500">Key: {{ template.template_key }}</p>
            <p class="text-sm text-stone-500">Last updated {{ template.updated_at | date:'medium' }}</p>
          </div>

          <div class="flex flex-wrap gap-3">
            <button type="button" class="rounded-full border border-black/10 px-4 py-2 text-[13px] font-semibold text-stone-700" [disabled]="saving()" (click)="openEditModal(template)">Edit Details</button>
            <button type="button" class="rounded-full bg-stone-900 px-4 py-2 text-[13px] font-semibold text-white" (click)="openStudio(template)">Open Studio</button>
            <button type="button" class="rounded-full border border-black/10 px-4 py-2 text-[13px] font-semibold text-stone-700" [disabled]="saving()" (click)="toggleTemplate(template)">
              {{ template.is_active ? 'Deactivate' : 'Activate' }}
            </button>
            <button
              type="button"
              class="rounded-full border border-[#c97972] bg-[#fff7f5] px-4 py-2 text-[13px] font-semibold text-[#8f2f28] transition-colors duration-200 hover:bg-[#fce8e5] hover:text-[#7f1d1d] dark:border-rose-400/30 dark:bg-rose-500/10 dark:text-rose-200 dark:hover:bg-rose-900/30 dark:hover:text-rose-100 disabled:cursor-not-allowed disabled:opacity-50"
              [disabled]="saving()"
              (click)="requestDeleteTemplate(template)"
            >
              Delete
            </button>
          </div>
        </div>

      </article>

      <div *ngIf="!filteredTemplates().length" class="rounded-[24px] border border-dashed border-black/10 bg-stone-50 px-6 py-10 text-center text-sm text-stone-500">
        No templates matched your filters.
      </div>
    </div>
  </section>
</div>

<app-proposal-template-upsert-modal
  [open]="modalOpen()"
  [saving]="saving()"
  [mode]="modalMode()"
  [template]="selectedTemplate()"
  (close)="closeTemplateModal()"
  (confirm)="saveTemplateRecord($event)"
/>
