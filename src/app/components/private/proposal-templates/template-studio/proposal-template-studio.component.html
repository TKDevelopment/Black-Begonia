<div class="bb-studio-shell">
  <app-loading-state-block
    *ngIf="loading()"
    title="Loading template studio"
    description="Please wait while we load the Studio SDK editor and proposal template record."
    minHeightClass="min-h-[520px]"
  />

  <app-error-state-block
    *ngIf="!loading() && error()"
    title="Unable to load template studio"
    [description]="error()!"
    (retry)="reload()"
    minHeightClass="min-h-[520px]"
  />

  <div *ngIf="!loading() && !error() && template() as template" class="bb-studio-app">
    <header class="bb-studio-header">
      <button type="button" class="bb-studio-link" (click)="openTemplateList()">
        <span class="bb-studio-link-arrow" aria-hidden="true">←</span>
        <span>Back to Templates</span>
      </button>

      <div class="bb-studio-header-actions">
        <button type="button" class="bb-studio-primary" [disabled]="saving() || !ready()" (click)="saveTemplate()">
          {{ saving() ? 'Publishing...' : 'Publish Template' }}
        </button>
      </div>
    </header>

    <section class="bb-studio-editor-card">
      <div #editorHost class="bb-editor-host"></div>
    </section>
  </div>
</div>
