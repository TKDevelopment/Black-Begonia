<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/45 p-3" (click)="closed.emit()"><form role="dialog" aria-modal="true" aria-labelledby="payment-settings-title" class="max-h-[92vh] w-full max-w-2xl overflow-y-auto rounded-3xl bg-white p-5 shadow-2xl sm:p-7" (click)="$event.stopPropagation()" (ngSubmit)="save()">
  <header class="flex justify-between gap-4"><div><p class="text-xs uppercase tracking-[.22em] text-[#c46f67]">Payments</p><h2 id="payment-settings-title" class="font-cormorant text-3xl">Collection settings</h2></div><button type="button" class="rounded-full border px-3 py-1.5" (click)="closed.emit()">Close</button></header>
  <p *ngIf="loading()" class="py-10 text-center">Loading settings…</p><p *ngIf="error()" class="my-4 rounded-xl bg-red-50 p-3 text-red-800" role="alert">{{error()}}</p>
  <div *ngIf="!loading()" class="mt-5 space-y-5"><section class="grid gap-3 sm:grid-cols-3"><label>Business timezone<input class="field" name="timezone" [(ngModel)]="settings.business_timezone" required /></label><label>Send after<input class="field" type="time" name="start" [(ngModel)]="settings.send_window_start" required /></label><label>Send before<input class="field" type="time" name="end" [(ngModel)]="settings.send_window_end" required /></label></section>
    <section class="grid gap-3 sm:grid-cols-2"><label>Cash instructions<textarea class="field" name="cash" [(ngModel)]="settings.cash_instructions" rows="3"></textarea></label><label>Check instructions<textarea class="field" name="check" [(ngModel)]="settings.check_instructions" rows="3"></textarea></label></section>
    <label>Approved Venmo business target<input class="field" name="venmoTarget" [(ngModel)]="settings.venmo_business_target" placeholder="@business-name or approved URL" /></label>
    <section class="grid gap-2 sm:grid-cols-2"><label class="toggle"><input type="checkbox" name="collection" [(ngModel)]="settings.collection_enabled" /> Provider collection enabled</label><label class="toggle"><input type="checkbox" name="reminders" [(ngModel)]="settings.reminders_enabled" /> Automated reminders enabled</label><label class="toggle"><input type="checkbox" name="stripe" [(ngModel)]="settings.stripe_enabled" /> Stripe card option enabled</label><label class="toggle"><input type="checkbox" name="venmo" [(ngModel)]="settings.venmo_enabled" /> Integrated Venmo enabled</label></section>
    <label>Provider environment<select class="field" name="environment" [(ngModel)]="settings.provider_environment"><option value="sandbox">Sandbox</option><option value="production">Production</option></select></label>
    <aside class="rounded-2xl bg-stone-100 p-4"><strong>Card processing fee: fixed off</strong><p class="mt-1 text-sm text-stone-600">Customers are charged the exact payment principal. Merchant processing fees are tracked separately and never reduce fulfillment.</p></aside>
  </div>
  <footer class="mt-6 flex justify-end gap-2"><button type="button" class="secondary" (click)="closed.emit()">Cancel</button><button type="submit" class="primary" [disabled]="saving()||loading()">{{saving()?'Saving…':'Save settings'}}</button></footer>
</form></div>
