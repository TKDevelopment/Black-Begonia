<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-[rgba(28,25,23,0.38)] px-4 py-4 backdrop-blur-[2px]">
  <div class="flex max-h-[calc(100vh-2rem)] w-full max-w-4xl flex-col overflow-hidden rounded-[28px] border border-stone-200 bg-[#f7f4f1] shadow-[0_28px_80px_rgba(28,25,23,0.22)]">
    <div class="border-b border-stone-200 bg-white/95 px-6 py-5 md:px-8">
      <div class="flex items-start justify-between gap-4">
        <div>
          <span class="inline-flex rounded-full border border-[#ead7d0] bg-[#f8ebe7] px-3 py-1 font-oswald text-[11px] uppercase tracking-[0.24em] text-[#c46f67]">Recipe Component</span>
          <h3 class="mt-4 font-cormorant text-4xl leading-none text-stone-900">{{ title }}</h3>
          <p class="mt-3 max-w-2xl text-sm leading-6 text-stone-600">Choose a catalog item and define how much of it is consumed by a single arrangement build.</p>
        </div>
        <button type="button" (click)="onClose()" [disabled]="saving" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-stone-200 bg-stone-50 text-stone-500 transition hover:bg-stone-100 hover:text-stone-800 disabled:opacity-50" aria-label="Close arrangement component modal">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-6 py-6 md:px-8">
      <div *ngIf="validationError()" class="mb-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ validationError() }}</div>
      <div class="grid gap-5 xl:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]">
        <div class="rounded-[24px] border border-stone-200 bg-white p-5 shadow-sm md:p-6">
          <div class="border-b border-stone-200 pb-4"><p class="font-oswald text-[11px] uppercase tracking-[0.24em] text-[#c46f67]">Catalog Item</p></div>
          <div class="mt-5 grid gap-4">
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.16em] text-stone-500">Item</label>
              <select [ngModel]="itemId()" (ngModelChange)="itemId.set($event)" [disabled]="mode === 'edit'" class="mt-2 w-full rounded-2xl border border-stone-300 bg-[#fcfaf8] px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc] disabled:cursor-not-allowed disabled:opacity-70">
                <option value="">Select a catalog item</option>
                <option *ngFor="let item of catalogItems" [value]="item.item_id">{{ formatItemLabel(item) }}</option>
              </select>
            </div>
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.16em] text-stone-500">Quantity Per Arrangement</label>
              <input type="number" step="0.01" min="0.01" [ngModel]="quantityPerArrangement()" (ngModelChange)="quantityPerArrangement.set($event)" class="mt-2 w-full rounded-2xl border border-stone-300 bg-[#fcfaf8] px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc]" />
            </div>
          </div>
        </div>

        <div class="rounded-[24px] border border-stone-200 bg-white p-5 shadow-sm md:p-6">
          <div class="border-b border-stone-200 pb-4"><p class="font-oswald text-[11px] uppercase tracking-[0.24em] text-[#c46f67]">Reserve & Notes</p></div>
          <div class="mt-5 grid gap-4">
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.16em] text-stone-500">Reserve Percent</label>
              <input type="number" step="0.01" min="0" [ngModel]="wastePercent()" (ngModelChange)="wastePercent.set($event)" placeholder="Optional" class="mt-2 w-full rounded-2xl border border-stone-300 bg-[#fcfaf8] px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc]" />
            </div>
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.16em] text-stone-500">Notes</label>
              <textarea rows="5" [ngModel]="notes()" (ngModelChange)="notes.set($event)" class="mt-2 w-full rounded-[22px] border border-stone-300 bg-[#fcfaf8] px-4 py-4 text-sm leading-7 text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc]"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="border-t border-stone-200 bg-white/95 px-6 py-4 md:px-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <p class="text-sm text-stone-500">Reserve helps the shopping list hold back a small buffer for imperfect blooms or replacement stems.</p>
        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:items-center">
          <button type="button" (click)="onClose()" [disabled]="saving" class="inline-flex items-center justify-center rounded-full border border-stone-300 bg-white px-5 py-3 font-oswald text-xs uppercase tracking-[0.22em] text-stone-700 transition hover:border-stone-400 disabled:cursor-not-allowed disabled:opacity-50">Cancel</button>
          <button type="button" (click)="onConfirm()" [disabled]="saving" class="inline-flex items-center justify-center rounded-full bg-[#1f1f1f] px-5 py-3 font-oswald text-xs uppercase tracking-[0.22em] text-white transition hover:bg-[#ea938c] disabled:cursor-not-allowed disabled:opacity-50">{{ confirmLabel }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
