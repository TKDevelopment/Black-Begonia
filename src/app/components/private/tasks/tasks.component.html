<div class="min-h-screen bg-[#f7f4f1]">
  <div class="mx-auto w-full max-w-[1880px] space-y-5 px-3 py-5 sm:px-4 md:px-6 md:space-y-6 md:py-8 2xl:px-8">
    <app-crm-page-header
      title="Tasks"
      subtitle="Track internal follow-up, ownership, and due dates across leads and projects."
      primaryActionLabel="Create Task"
      (primaryAction)="openCreateTaskModal()"
    />

    <app-search-filter-bar
      searchPlaceholder="Search by title, description, related lead, or assignee"
      [searchValue]="searchTerm()"
      [filters]="filters()"
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
      (reset)="resetFilters()"
    />

    <div *ngIf="error()" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <span>{{ error() }}</span>
        <button
          type="button"
          (click)="retryLoad()"
          class="inline-flex items-center justify-center rounded-xl border border-rose-200 bg-white px-3 py-1.5 text-sm font-medium text-rose-700 transition hover:bg-rose-100"
        >
          Retry
        </button>
      </div>
    </div>

    <app-entity-table-shell
      [columns]="columns"
      [rows]="filteredTasks()"
      [loading]="loading()"
      [clickableRows]="true"
      trackByField="task_id"
      emptyTitle="No tasks found"
      emptyDescription="Create a task or adjust your filters to see matching work items."
      (rowClick)="openTask($event)"
    >
      <ng-template appEntityTableCell="title" let-row>
        <div class="space-y-1">
          <div class="font-medium text-stone-900">{{ row.title }}</div>
          <div *ngIf="row.description" class="line-clamp-2 text-xs text-stone-500">
            {{ row.description }}
          </div>
        </div>
      </ng-template>

      <ng-template appEntityTableCell="related" let-row>
        <div class="space-y-1">
          <div class="text-stone-800">{{ getTaskRelatedLabel(row) }}</div>
          <button
            *ngIf="row.lead_id"
            type="button"
            (click)="openRelatedLead(row, $event)"
            class="text-xs font-medium text-[#c46f67] transition hover:opacity-80"
          >
            Open Lead
          </button>
        </div>
      </ng-template>

      <ng-template appEntityTableCell="assignee" let-row>
        <span class="text-stone-700">{{ getTaskAssigneeName(row) }}</span>
      </ng-template>

      <ng-template appEntityTableCell="due_at" let-row>
        <span class="text-stone-700">{{ formatDate(row.due_at) }}</span>
      </ng-template>

      <ng-template appEntityTableCell="priority" let-row>
        <app-status-badge [label]="row.priority" [tone]="getTaskPriorityTone(row.priority)" />
      </ng-template>

      <ng-template appEntityTableCell="status" let-row>
        <app-status-badge [label]="row.status" [tone]="getTaskStatusTone(row.status)" />
      </ng-template>
    </app-entity-table-shell>

    <app-task-upsert-modal
      [open]="modalOpen()"
      [saving]="saving()"
      [mode]="modalMode()"
      [task]="selectedTask()"
      [internalUsers]="internalUsers()"
      [relatedLeadLabel]="selectedTask()?.lead_name ?? null"
      (close)="closeTaskModal()"
      (confirm)="saveTask($event)"
    />
  </div>
</div>
