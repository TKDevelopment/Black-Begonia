<div *ngIf="open" class="modal-backdrop">
  <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="payment-log-title">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 id="payment-log-title" class="font-cormorant text-2xl text-stone-900">Log Payment</h2>
        <p class="mt-1 text-sm text-stone-600">Record a deposit or final payment received outside Stripe.</p>
      </div>
      <button type="button" class="crm-secondary-button icon-button" (click)="close.emit()" aria-label="Close">X</button>
    </div>

    <form class="mt-5 grid gap-4" (ngSubmit)="submit()">
      <label>
        <span>Payment Type</span>
        <select name="obligation_id" [ngModel]="obligation_id" (ngModelChange)="selectObligation($event)">
          <option *ngFor="let obligation of obligations" [value]="obligation.project_payment_record_id">
            {{ obligation.payment_kind === 'deposit' ? 'Deposit' : 'Final Payment' }} — {{ obligation.outstanding_amount ?? obligation.amount_due | currency }} outstanding
          </option>
        </select>
      </label>

      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span>Amount Received</span>
          <input name="amount" type="number" min="0.01" step="0.01" [(ngModel)]="amount" />
        </label>
        <label>
          <span>Received Date</span>
          <input name="received_at" type="date" [(ngModel)]="received_at" />
        </label>
      </div>

      <label>
        <span>Payment Method</span>
        <select name="payment_method" [(ngModel)]="payment_method">
          <option value="venmo">Venmo</option>
          <option value="check">Check</option>
          <option value="cash">Cash</option>
          <option value="other">Other</option>
        </select>
      </label>

      <label>
        <span>Notes</span>
        <textarea name="notes" rows="3" [(ngModel)]="notes"></textarea>
      </label>

      <details class="rounded-2xl border border-black/10 p-3">
        <summary class="cursor-pointer text-sm font-medium">Duplicate or overpayment confirmation</summary>
        <div class="mt-3 grid gap-3">
          <input name="suspected_reference" [(ngModel)]="suspected_reference" placeholder="Suspected BB payment reference" />
          <textarea name="duplicate_override_reason" rows="2" [(ngModel)]="duplicate_override_reason" placeholder="Required reason when overriding a duplicate warning"></textarea>
          <label class="flex items-center gap-2"><input name="confirm_overpayment" type="checkbox" [(ngModel)]="confirm_overpayment" /> Confirm reviewed overpayment</label>
        </div>
      </details>

      <p *ngIf="error" class="text-sm font-medium text-rose-700">{{ error }}</p>

      <div class="flex justify-end gap-3">
        <button type="button" class="crm-secondary-button secondary-button" (click)="close.emit()">Cancel</button>
        <button type="submit" class="crm-primary-button primary-button" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save Payment' }}
        </button>
      </div>
    </form>
  </section>
</div>
