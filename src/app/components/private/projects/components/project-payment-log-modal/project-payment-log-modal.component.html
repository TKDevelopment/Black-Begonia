<div *ngIf="open" class="modal-backdrop">
  <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="payment-log-title">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 id="payment-log-title" class="font-cormorant text-2xl text-stone-900">Log Payment</h2>
        <p class="mt-1 text-sm text-stone-600">Record a deposit or final payment received outside Stripe.</p>
      </div>
      <button type="button" class="crm-secondary-button icon-button" (click)="close.emit()" aria-label="Close">X</button>
    </div>

    <form class="mt-5 grid gap-4" (ngSubmit)="submit()">
      <label>
        <span>Payment Type</span>
        <select name="payment_kind" [(ngModel)]="payment_kind">
          <option value="deposit">Deposit</option>
          <option value="final_payment">Final Payment</option>
        </select>
      </label>

      <label>
        <span>Status</span>
        <select name="status" [(ngModel)]="status">
          <option value="not_due">Not Due</option>
          <option value="due">Due</option>
          <option value="paid">Paid</option>
          <option value="waived">Waived</option>
        </select>
      </label>

      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span>Amount Due</span>
          <input name="amount_due" type="number" min="0" step="0.01" [(ngModel)]="amount_due" />
        </label>
        <label>
          <span>Amount Paid</span>
          <input name="amount_paid" type="number" min="0" step="0.01" [(ngModel)]="amount_paid" />
        </label>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span>Due Date</span>
          <input name="due_date" type="date" [(ngModel)]="due_date" />
        </label>
        <label>
          <span>Paid Date</span>
          <input name="paid_date" type="date" [(ngModel)]="paid_date" />
        </label>
      </div>

      <label>
        <span>Payment Method</span>
        <select name="payment_method" [(ngModel)]="payment_method">
          <option value="venmo">Venmo</option>
          <option value="check">Check</option>
          <option value="cash">Cash</option>
          <option value="other">Other</option>
        </select>
      </label>

      <label>
        <span>Notes</span>
        <textarea name="notes" rows="3" [(ngModel)]="notes"></textarea>
      </label>

      <p *ngIf="error" class="text-sm font-medium text-rose-700">{{ error }}</p>

      <div class="flex justify-end gap-3">
        <button type="button" class="crm-secondary-button secondary-button" (click)="close.emit()">Cancel</button>
        <button type="submit" class="crm-primary-button primary-button" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save Payment' }}
        </button>
      </div>
    </form>
  </section>
</div>
