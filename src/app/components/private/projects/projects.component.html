<div class="min-h-screen bg-[#f7f4f1]">
  <div class="mx-auto w-full max-w-[1880px] space-y-5 px-3 py-5 sm:px-4 md:space-y-6 md:px-6 md:py-8 2xl:px-8">
    <app-crm-page-header
      title="Projects"
      subtitle="Browse booked projects, operational statuses, event dates, and project actions."
    />

    <app-error-state-block
      *ngIf="error()"
      title="Unable to load projects"
      [description]="error()!"
    />

    <app-search-filter-bar
      searchPlaceholder="Search by project, venue, service type, event type, status, or date"
      [searchValue]="searchTerm()"
      [filters]="filters()"
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
      (reset)="resetFilters()"
    />

    <app-entity-table-shell
      [columns]="columns"
      [rows]="filteredProjects()"
      [loading]="loading()"
      [clickableRows]="true"
      trackByField="project_id"
      emptyTitle="No projects found"
      emptyDescription="Try adjusting search or filters to find the project you need."
      (rowClick)="openProject($event)"
    >
      <ng-template appEntityTableCell="project" let-row>
        <div class="space-y-0.5">
          <div class="font-medium text-stone-900">{{ row.project_name }}</div>
          <div class="text-xs text-stone-500">{{ formatDisplayValue(row.event_type) }}</div>
        </div>
      </ng-template>

      <ng-template appEntityTableCell="service_type" let-row>
        <span>{{ formatDisplayValue(row.service_type) }}</span>
      </ng-template>

      <ng-template appEntityTableCell="event_date" let-row>
        <span>{{ formatDate(row.event_date) }}</span>
      </ng-template>

      <ng-template appEntityTableCell="status" let-row>
        <app-status-badge
          [label]="formatProjectStatus(row.status)"
          [tone]="getProjectStatusTone(row.status)"
        />
      </ng-template>

      <ng-template appEntityTableCell="actions" let-row>
        <button
          type="button"
          (click)="$event.stopPropagation(); openProject(row)"
          class="inline-flex items-center justify-center rounded-xl border border-black/10 bg-white px-3 py-1.5 text-xs font-medium text-stone-700 transition hover:bg-stone-50"
        >
          View
        </button>
      </ng-template>
    </app-entity-table-shell>
  </div>
</div>
