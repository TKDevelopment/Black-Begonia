<div
  *ngIf="open"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
>
  <div class="w-full max-w-lg rounded-2xl border border-stone-200 bg-white p-6 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-xl font-semibold text-stone-900">Decline Lead</h3>
        <p class="mt-2 text-sm leading-6 text-stone-600">
          Add an optional internal reason for why this lead is being declined.
        </p>
      </div>

      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="rounded-full px-3 py-1 text-stone-500 transition hover:bg-stone-100"
      >
        ✕
      </button>
    </div>

    <div class="mt-5">
      <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500">
        Decline Reason
      </label>

      <textarea
        rows="5"
        class="mt-2 w-full rounded-xl border border-stone-300 px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc]"
        [ngModel]="reason()"
        (ngModelChange)="reason.set($event)"
        placeholder="Example: Outside budget, unavailable date, not a good fit, no response, etc."
      ></textarea>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-xl border border-stone-300 bg-white px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50 disabled:cursor-not-allowed disabled:opacity-60"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="onConfirm()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-xl bg-rose-600 px-4 py-2 text-sm font-medium text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving ? 'Declining...' : 'Decline Lead' }}
      </button>
    </div>
  </div>
</div>
