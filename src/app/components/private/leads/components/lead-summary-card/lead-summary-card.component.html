<div class="rounded-2xl border border-black/10 bg-white p-6 shadow-sm">
  <div class="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
    <div class="flex items-start gap-4">
      <div
        class="crm-theme-static-chip flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-[#f3dfdc] text-sm font-semibold text-stone-800"
      >
        {{ getInitials() }}
      </div>

      <div class="space-y-2">
        <div class="flex flex-wrap items-center gap-3">
          <h2 class="text-2xl font-semibold text-stone-900">
            {{ lead.first_name }} {{ lead.last_name }}
          </h2>

          <app-status-badge
            [label]="lead.status"
            [tone]="getLeadStatusTone(lead.status)"
            size="md"
          />
        </div>

        <div
          class="grid grid-cols-1 gap-x-8 gap-y-2 text-sm text-stone-600 sm:grid-cols-2"
        >
          <div>
            <span class="font-medium text-stone-800">Email:</span>
            {{ lead.email }}
          </div>

          <div>
            <span class="font-medium text-stone-800">Phone:</span>
            {{ lead.phone || 'Not provided' }}
          </div>

          <div>
            <span class="font-medium text-stone-800">Partner:</span>
            {{ getPartnerName() | titlecase }}
          </div>

          <div>
            <span class="font-medium text-stone-800">Source:</span>
            {{ lead.source | titlecase }}
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-wrap gap-3">
      <button
        type="button"
        (click)="consultationAction.emit()"
        [disabled]="consultationButtonDisabled"
        class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium text-white transition disabled:cursor-not-allowed disabled:bg-stone-300 disabled:text-stone-600"
        [ngClass]="consultationButtonDisabled ? 'bg-stone-300' : 'bg-[#ea938c] hover:opacity-90'"
      >
        {{ consultationButtonLabel }}
      </button>

      <button
        type="button"
        (click)="editLead.emit()"
        [disabled]="actionLoading || detailsLocked"
        class="inline-flex items-center justify-center rounded-xl border border-black/10 bg-white px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50 disabled:cursor-not-allowed disabled:opacity-60"
      >
        Edit Lead
      </button>
    </div>
  </div>
</div>
