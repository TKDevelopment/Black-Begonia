<div
  *ngIf="open"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
>
  <div class="w-full max-w-xl rounded-2xl border border-stone-200 bg-white p-6 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-xl font-semibold text-stone-900">Convert Lead</h3>
        <p class="mt-2 text-sm leading-6 text-stone-600">
          Convert this lead into the next stage of your CRM workflow.
        </p>
      </div>

      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="rounded-full px-3 py-1 text-stone-500 transition hover:bg-stone-100"
      >
        ✕
      </button>
    </div>

    <div *ngIf="lead" class="mt-5 rounded-xl border border-stone-200 bg-stone-50 p-4">
      <p class="font-medium text-stone-900">
        {{ lead.first_name }} {{ lead.last_name }}
      </p>
      <p class="mt-1 text-sm text-stone-600">
        {{ lead.email }}
      </p>
      <p class="mt-1 text-sm text-stone-600">
        {{ lead.service_type | titlecase }}
        <ng-container *ngIf="lead.event_date">
          • {{ lead.event_date }}
        </ng-container>
      </p>
    </div>

    <div class="mt-5 space-y-4">
      <label class="flex items-start gap-3 rounded-xl border border-stone-200 p-4">
        <input
          type="checkbox"
          class="mt-1"
          [ngModel]="createPrimaryContact()"
          (ngModelChange)="createPrimaryContact.set(!!$event)"
        />
        <div>
          <p class="font-medium text-stone-900">Create primary contact</p>
          <p class="text-sm text-stone-600">
            Prepare a contact record from this lead’s client details.
          </p>
        </div>
      </label>

      <label class="flex items-start gap-3 rounded-xl border border-stone-200 p-4">
        <input
          type="checkbox"
          class="mt-1"
          [ngModel]="createProjectShell()"
          (ngModelChange)="createProjectShell.set(!!$event)"
        />
        <div>
          <p class="font-medium text-stone-900">Create project shell</p>
          <p class="text-sm text-stone-600">
            Prepare an initial floral project/event record for follow-up work.
          </p>
        </div>
      </label>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500">
          Internal Notes
        </label>

        <textarea
          rows="4"
          class="mt-2 w-full rounded-xl border border-stone-300 px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc]"
          [ngModel]="notes()"
          (ngModelChange)="notes.set($event)"
          placeholder="Optional notes for the conversion record..."
        ></textarea>
      </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-xl border border-stone-300 bg-white px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50 disabled:cursor-not-allowed disabled:opacity-60"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="onConfirm()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-xl bg-stone-900 px-4 py-2 text-sm font-medium text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving ? 'Converting...' : 'Convert Lead' }}
      </button>
    </div>
  </div>
</div>
