<div
  *ngIf="open"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
>
  <div class="w-full max-w-2xl rounded-[28px] border border-stone-200 bg-white p-6 shadow-[0_24px_80px_rgba(0,0,0,0.18)] md:p-8">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p class="font-oswald text-xs uppercase tracking-[0.3em] text-[#ea938c]">
          Internal Note
        </p>
        <h3 class="mt-3 font-cormorant text-4xl leading-none text-[#1f1f1f]">
          Add Note
        </h3>
        <p class="mt-4 text-sm leading-7 text-stone-600">
          Save an internal note to the lead activity timeline for Becca and the CRM team.
        </p>
      </div>

      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-stone-200 text-stone-500 transition hover:bg-stone-100 disabled:opacity-50"
        aria-label="Close note modal"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div *ngIf="validationError()" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
      {{ validationError() }}
    </div>

    <div class="mt-6">
      <label class="block font-oswald text-xs uppercase tracking-[0.25em] text-[#1f1f1f]/80">
        Note
      </label>
      <textarea
        rows="6"
        [ngModel]="note()"
        (ngModelChange)="note.set($event)"
        class="mt-3 w-full rounded-[24px] border border-black/10 bg-[#f7f4f1] px-5 py-4 text-sm leading-7 text-[#1f1f1f] outline-none transition placeholder:text-[#8d8d8d] focus:border-[#ea938c] focus:ring-2 focus:ring-[#ea938c]/20"
        placeholder="Add internal context, next steps, follow-up reminders, or handoff notes."
      ></textarea>
    </div>

    <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <button
        type="button"
        (click)="onClose()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-full border border-stone-300 px-5 py-3 font-oswald text-xs uppercase tracking-[0.22em] text-stone-700 transition hover:border-stone-400 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="onConfirm()"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-full bg-[#1f1f1f] px-5 py-3 font-oswald text-xs uppercase tracking-[0.22em] text-white transition hover:bg-[#ea938c] disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ saving ? 'Saving...' : 'Save Note' }}
      </button>
    </div>
  </div>
</div>
