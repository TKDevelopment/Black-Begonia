<div class="space-y-2">
  <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500">
    Update Status
  </label>

  <select
    class="w-full rounded-xl border border-black/10 bg-white px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-[#ea938c] focus:ring-2 focus:ring-[#f3dfdc] disabled:cursor-not-allowed disabled:bg-stone-100"
    [ngModel]="value"
    (ngModelChange)="onSelectionChange($event)"
    [disabled]="disabled"
  >
    <option *ngFor="let status of allowedStatuses" [value]="status">
      {{ formatLabel(status) }}
    </option>
  </select>
</div>
