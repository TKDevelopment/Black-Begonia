<section class="min-h-screen bg-white font-cormorant">
  <ng-container *ngIf="gallery">
    <div class="animate-fade-in">
      <div class="relative min-h-[300px] md:min-h-[600px] lg:min-h-[925px] overflow-hidden flex flex-col items-start justify-between text-white">
        <!-- Hero Image -->
        <img
          [ngSrc]="gallery.heroImage || gallery.coverImage"
          priority
          fill
          sizes="100vw"
          class="object-cover object-center"
          alt="Wedding floral gallery hero"
        />

        <!-- Overlay -->
        <div class="absolute inset-0"></div>

        <!-- Back Button -->
        <button
          routerLink="/portfolio"
          class="relative z-10 bg-white/60 text-gray-700 text-xl -translate-x-[-40px] -translate-y-[-30px] transition-colors duration-300 py-2 px-5 cursor-pointer rounded-full hover:bg-gray-100/80 hover:text-black"
        >
          ← Back to Portfolio
        </button>

        <!-- Text Content -->
        <div class="relative z-10 w-full text-center py-10 px-4 bg-black/40">
          <h1 class="text-5xl md:text-7xl">
            {{ gallery.coupleNames }}
          </h1>
          <p class="text-xl md:text-2xl font-oswald tracking-widest mt-2">
            {{ gallery.venue | uppercase }}
          </p>
        </div>
      </div>

      <div class="max-w-screen-xl mx-auto px-6 py-12">
        <div class="mb-8">
          <p
            routerLink="/portfolio"
            class="text-xl hover:text-[#ea938c] transition-colors cursor-pointer duration-200"
          >
            ← Back to Portfolio
          </p>
        </div>

        <div class="max-w-3xl mx-auto text-center mb-12" *ngIf="gallery.description">
          <p class="text-xl text-gray-700">{{ gallery.description }}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <img
            *ngFor="let image of gallery.images"
            [src]="image.thumbUrl"
            [alt]="image.altText"
            class="w-full h-auto transition-all duration-700 ease-out"
            [class.opacity-0]="!loadedImages[image.imageId]"
            [class.opacity-100]="loadedImages[image.imageId]"
            [class.scale-[0.98]]="!loadedImages[image.imageId]"
            [class.scale-100]="loadedImages[image.imageId]"
            loading="lazy"
            (load)="onImageLoad(image.imageId)"
          />
        </div>

        <div class="my-8">
          <p
            routerLink="/portfolio"
            class="text-xl hover:text-[#ea938c] transition-colors cursor-pointer duration-200"
          >
            ← Back to Portfolio
          </p>
        </div>
      </div>
    </div>
  </ng-container>
</section>
